<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Management App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1><i class="fas fa-tasks"></i> Task Manager</h1>
            <p>Gérez vos tâches efficacement</p>
        </header>

        <main class="main-content">
            <!-- Section d'entrée -->
            <section class="input-section">
                <div class="input-group">
                    <input 
                        type="text" 
                        id="taskInput" 
                        class="task-input" 
                        placeholder="Ajouter une nouvelle tâche..."
                        autocomplete="off"
                    >
                    <button id="addBtn" class="add-btn"><i class="fas fa-plus"></i> Ajouter</button>
                </div>
                <div class="filter-group">
                    <button class="filter-btn active" data-filter="all"><i class="fas fa-list"></i> Tous</button>
                    <button class="filter-btn" data-filter="active"><i class="fas fa-spinner"></i> En cours</button>
                    <button class="filter-btn" data-filter="completed"><i class="fas fa-check-circle"></i> Complétées</button>
                </div>
            </section>

            <!-- Statistiques -->
            <section class="stats">
                <div class="stat-card">
                    <span class="stat-label">Total</span>
                    <span class="stat-value" id="totalTasks">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">En cours</span>
                    <span class="stat-value active" id="activeTasks">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Complétées</span>
                    <span class="stat-value completed" id="completedTasks">0</span>
                </div>
            </section>

            <!-- Liste des tâches -->
            <section class="tasks-section">
                <div id="tasksList" class="tasks-list">
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <p>Aucune tâche pour le moment. Créez-en une !</p>
                    </div>
                </div>
            </section>

            <!-- Section Actions -->
            <section class="actions-section">
                <button id="clearCompleted" class="clear-btn">
                    <i class="fas fa-trash"></i> Supprimer les complétées
                </button>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
